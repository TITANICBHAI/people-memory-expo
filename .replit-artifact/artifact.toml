kind = "mobile"
previewPath = "/people-mobile/"
title = "People Memory"
version = "1.0.0"
id = "artifacts/people-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 21989
name = "expo"
paths = ["/people-mobile/"]

[services.development]
run = "pnpm --filter @workspace/people-mobile run dev"

[services.env]
PORT = "21989"
BASE_PATH = "/people-mobile/"

[services.production]
build = ["pnpm", "--filter", "@workspace/people-mobile", "run", "build"]
run = ["pnpm", "--filter", "@workspace/people-mobile", "run", "serve"]
